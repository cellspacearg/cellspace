<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - Cell Space Argentina</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- ✅ FIREBASE - AGREGADO (ANTES DE config.js) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="nav">
    <div class="nav-left">
      <a href="index.html" class="nav-logo-link">
        <img src="assets/logo.png" alt="Cell Space" class="nav-logo">
      </a>
      <div>
        <div class="nav-brand">CELL SPACE</div>
        <div class="nav-subtitle">ARGENTINA</div>
      </div>
    </div>
    <div class="nav-right">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="tienda.html" class="nav-link active">Tienda</a>
      <a href="servicios.html" class="nav-link">Servicios</a>
      <button class="cart-header-btn" onclick="openCart()">
        🛒 Carrito <span id="cartCountHeader" style="display:none;">0</span>
      </button>
      <a href="login.html" class="btn-small">Ingresar</a>
    </div>
  </nav>

  <!-- Tienda -->
  <section class="shop-section">
    <div class="shop-header">
      <!-- ✅ H1 CORREGIDO -->
      <h1 class="shop-title">Tienda <span>Premium</span></h1>
      <p class="shop-subtitle">Licencias, hardware y herramientas profesionales</p>
    </div>

    <div class="shop-controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Buscar productos...">
      </div>
    </div>

    <div class="category-filters">
      <button class="filter-btn active" data-category="all">Todos</button>
      <button class="filter-btn" data-category="Licencias">Licencias</button>
      <button class="filter-btn" data-category="Hardware">Hardware</button>
      <button class="filter-btn" data-category="Accesorios">Accesorios</button>
    </div>

    <p class="products-count" id="productsCount"></p>

    <!-- Contenedor de productos -->
    <div class="products-grid-premium" id="productsGrid"></div>
  </section>

  <!-- Carrito Modal -->
  <div class="cart-overlay" id="cartOverlay">
    <div class="cart-modal">
      <div class="cart-header">
        <h2>🛒 Tu Carrito</h2>
        <button onclick="closeCart()" style="background:none;border:none;color:white;font-size:24px;cursor:pointer;">×</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total:</span>
          <span id="cartTotal">$0.00</span>
        </div>
        <div class="cart-buttons">
          <button onclick="closeCart()" class="btn btn-secondary">Seguir Comprando</button>
          <button onclick="checkout()" class="btn btn-primary">Finalizar Compra</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick View Modal -->
  <div id="quickViewModal" class="quick-view-modal">
    <div class="quick-view-content">
      <button class="quick-view-close" onclick="closeQuickView()">&times;</button>
      
      <div class="quick-view-body">
        <div class="quick-view-image">
          <img id="qvImage" src="" alt="Producto">
          <div class="qv-badges">
            <span id="qvStock" class="badge-stock"></span>
            <span id="qvDiscount" class="badge-discount" style="display:none;"></span>
          </div>
        </div>
        
        <div class="quick-view-info">
          <div class="qv-category" id="qvCategory"></div>
          <h2 class="qv-title" id="qvTitle"></h2>
          
          <div class="qv-rating">
            <span class="stars" id="qvStars"></span>
            <span class="reviews-count" id="qvReviews"></span>
          </div>
          
          <div class="qv-price-section">
            <div class="qv-price">
              <span class="current-price" id="qvPrice"></span>
              <span class="old-price" id="qvOldPrice" style="display:none;"></span>
            </div>
            <span class="qv-installments">3 cuotas sin interés</span>
          </div>
          
          <div class="qv-description" id="qvDescription"></div>
          
          <div class="qv-specs">
            <h3>Características:</h3>
            <ul id="qvSpecsList"></ul>
          </div>
          
          <div class="qv-actions">
            <div class="qv-quantity">
              <label>Cantidad:</label>
              <div class="quantity-selector">
                <button onclick="decrementQty()" class="qty-btn">-</button>
                <input type="number" id="qvQuantity" value="1" min="1" max="10">
                <button onclick="incrementQty()" class="qty-btn">+</button>
              </div>
            </div>
            
            <button onclick="addToCartFromQuickView()" class="btn-add-to-cart-qv">
              🛒 Agregar al Carrito
            </button>
          </div>
          
          <div class="qv-guarantees">
            <div class="guarantee-item">
              <span class="guarantee-icon">✓</span>
              <span>Garantía 6 meses</span>
            </div>
            <div class="guarantee-item">
              <span class="guarantee-icon">🚚</span>
              <span>Envío a todo el país</span>
            </div>
            <div class="guarantee-item">
              <span class="guarantee-icon">🔒</span>
              <span>Pago 100% seguro</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ SCRIPTS EN ORDEN CORRECTO -->
  <script src="js/config.js"></script>
  <script src="js/tienda.js"></script>
</body>
</html>
