<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración | Cell Space</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css?v=15">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- DETECTOR INLINE (no módulo): captura errores de carga de main.js -->
  <script>
    window.__adminErrors = [];
    window.addEventListener('error', function(e){
      window.__adminErrors.push('ERROR: ' + e.message + '  →  ' + (e.filename||'') + ':' + (e.lineno||''));
      pintar();
    });
    window.addEventListener('unhandledrejection', function(e){
      window.__adminErrors.push('PROMESA: ' + String(e.reason && (e.reason.message||e.reason)));
      pintar();
    });
    function pintar(){
      var app = document.getElementById('app');
      if(!app) return;
      app.innerHTML =
        '<div style="max-width:680px;margin:50px auto;padding:25px;background:#151515;'+
        'border:1px solid #ff4444;border-radius:16px;color:#fff;font-family:Montserrat,sans-serif;">'+
        '<h2 style="color:#ff4444;margin-top:0;">⚠️ El panel no pudo cargar</h2>'+
        '<p style="color:#ccc;">Sacale foto a este cuadro y mandáselo a tu asistente:</p>'+
        '<pre style="background:#0a0a0a;padding:15px;border-radius:8px;color:#ff9999;'+
        'white-space:pre-wrap;word-break:break-word;font-size:13px;">'+
        window.__adminErrors.join('\n\n') +
        '</pre></div>';
    }
  </script>
</head>
<body class="admin-body">
  <div id="app">
    <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;
                height:100vh;gap:15px;color:#888;font-family:Montserrat,sans-serif;">
      <i class="fas fa-spinner fa-spin" style="font-size:40px;color:#FF6A00;"></i>
      <p style="margin:0;">Cargando panel…</p>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
