<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Cell Space Argentina</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body class="login-page">
  <div class="particles" id="particles"></div>

  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <img src="assets/logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
        <h1>CELL SPACE ARGENTINA</h1>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">Iniciar Sesión</button>
        <button class="auth-tab" onclick="switchAuth('register')">Crear Cuenta</button>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="loginPass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
        <p class="form-note">¿Olvidaste tu contraseña? <a href="#">Recuperar</a></p>
      </form>

      <form id="registerForm" class="auth-form" style="display:none;">
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" id="regName" placeholder="Juan Pérez" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="regPass" placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Crear Cuenta</button>
        <p class="form-note">Al registrarte aceptas nuestros términos y condiciones</p>
      </form>

      <div id="authMsg" class="auth-msg"></div>

      <div class="login-footer">
        <a href="index.html">← Volver al sitio</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Partículas
    function createParticles(){
      const container = document.getElementById('particles');
      if(!container) return;
      for(let i=0;i<20;i++){
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random()*100+'%';
        p.style.animationDuration = (8+Math.random()*15)+'s';
        p.style.animationDelay = Math.random()*10+'s';
        p.style.width = p.style.height = (1+Math.random()*3)+'px';
        p.style.opacity = 0.1+Math.random()*0.4;
        container.appendChild(p);
      }
    }
    createParticles();
  </script>
</body>
</html>
