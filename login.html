<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Cell Space</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <img src="assets/logo.png" class="login-logo" onerror="this.style.display='none'">
          <h1>Iniciar <span style="color:var(--orange)">Sesión</span></h1>
        </div>
        
        <form id="loginForm">
          <div class="form-group">
            <label>Email o Nombre de Usuario</label>
            <input type="text" id="loginIdentifier" placeholder="tu@email.com o tu_username" required>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="loginPassword" placeholder="Tu contraseña" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
        </form>
        
        <div class="login-footer">
          <p>¿No tenés cuenta?</p>
          <p><a href="register-client.html">Registrarme como Cliente</a></p>
          <p><a href="register-technician.html">Registrarme como Técnico</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const identifier = document.getElementById('loginIdentifier').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      let email = identifier;
      
      // Si no parece un email, buscar el username en Firestore
      if (!identifier.includes('@')) {
        try {
          const usernameDoc = await db.collection('usernames').doc(identifier.toLowerCase()).get();
          if (usernameDoc.exists) {
            email = usernameDoc.data().email;
          } else {
            alert('❌ Nombre de usuario no encontrado');
            return;
          }
        } catch (error) {
          console.error('Error buscando username:', error);
          alert('❌ Error al buscar usuario');
          return;
        }
      }
      
      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        
        // Redirigir según tipo de usuario
        const userId = email.split('@')[0];
        const techDoc = await db.collection('technicians').doc(userId).get();
        
        if (techDoc.exists) {
          const techData = techDoc.data();
          if (techData.isPremium) {
            window.location.href = 'technician-zone.html';
          } else {
            window.location.href = 'technician-zone.html';
          }
        } else {
          window.location.href = 'index.html';
        }
        
      } catch (error) {
        if (error.code === 'user-not-found' || error.code === 'wrong-password') {
          alert('❌ Email o contraseña incorrectos');
        } else {
          alert('❌ Error: ' + error.message);
        }
      }
    });
  </script>
</body>
</html>
