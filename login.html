<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Cell Space</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
  
  <!-- EmailJS -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      // Tu Public Key
      emailjs.init("EYej4cfwI1OIadkG5");
    })();
  </script>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <img src="assets/logo.png" class="login-logo" onerror="this.style.display='none'">
          <h1>Iniciar <span style="color:var(--orange)">Sesión</span></h1>
        </div>
        
        <form id="loginForm">
          <div class="form-group">
            <label>Email o Nombre de Usuario</label>
            <input type="text" id="loginIdentifier" placeholder="tu@email.com o tu_username" required>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="loginPassword" placeholder="Tu contraseña" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
        </form>
        
        <div style="text-align:center;margin:20px 0;color:var(--muted);font-size:14px;position:relative;">
          <span style="background:#111;padding:0 10px;position:relative;z-index:1;">o continuá con</span>
          <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#333;"></div>
        </div>
        
        <button onclick="signInWithGoogle()" class="btn btn-google btn-block">
          <svg style="width:20px;height:20px;margin-right:10px;" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continuar con Google
        </button>
        
        <div class="login-footer">
          <p>¿No tenés cuenta?</p>
          <p><a href="register-client.html">Registrarme como Cliente</a></p>
          <p><a href="register-technician.html">Registrarme como Técnico</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal OTP -->
  <div id="otpModal" class="otp-modal" style="display:none;">
    <div class="otp-modal-content">
      <div style="text-align:center;margin-bottom:30px;">
        <div style="font-size:4rem;margin-bottom:10px;">🔐</div>
        <h2 style="color:var(--orange);margin:0 0 10px;">Código de Verificación</h2>
      </div>
      
      <p style="color:var(--muted);margin-bottom:20px;text-align:center;">
        Se ha enviado un código de 6 dígitos a<br>
        <strong id="otpEmail" style="color:white;font-size:1.1rem;"></strong>
      </p>
      
      <div class="otp-inputs">
        <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]*">
        <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]*">
        <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]*">
        <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]*">
        <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]*">
        <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]*">
      </div>
      
      <p style="color:#ff4444;font-size:12px;margin:10px 0;text-align:center;min-height:18px;" id="otpError"></p>
      
      <button onclick="verifyOTP()" class="btn btn-primary btn-block">Verificar Código</button>
      
      <p style="color:var(--muted);font-size:12px;margin:20px 0;text-align:center;">
        ¿No recibiste el código? <a href="#" onclick="resendOTP()" style="color:var(--orange);font-weight:600;">Reenviar</a>
      </p>
      
      <div style="background:rgba(255,68,68,0.1);border-left:3px solid #ff4444;padding:15px;margin-top:20px;border-radius:6px;">
        <p style="color:#ff9999;font-size:11px;margin:0;line-height:1.5;">
          <strong>⚠️ Importante:</strong> Nunca compartas este código con nadie.
        </p>
      </div>
      
      <p style="color:var(--muted);font-size:11px;margin-top:15px;text-align:center;">
        ⏰ Este código expirará en 10 minutos
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    let currentUser = null;
    
    document.addEventListener('DOMContentLoaded', () => {
      checkAuthState();
      setupOTPInputs();
    });
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      console.log('📝 Intento de login iniciado...');
      
      const identifier = document.getElementById('loginIdentifier').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      let email = identifier;
      
      // Si es username, buscar email
      if (!identifier.includes('@')) {
        try {
          const usernameDoc = await db.collection('usernames').doc(identifier.toLowerCase()).get();
          if (usernameDoc.exists) {
            email = usernameDoc.data().email;
          } else {
            alert('❌ Nombre de usuario no encontrado');
            return;
          }
        } catch (error) {
          console.error('Error buscando username:', error);
          alert('❌ Error al buscar usuario');
          return;
        }
      }
      
      try {
        console.log('📧 Email a usar:', email);
        const otp = generateOTP();
        
        // Guardar OTP en Firestore
        await db.collection('otp_codes').doc(email).set({
          code: otp,
          expiresAt: new Date(Date.now() + 10 * 60 * 1000),
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          attempts: 0
        });
        
        // Enviar Email
        await sendOTPEmail(email, otp);
        
        // Preparar siguiente paso
        sessionStorage.setItem('tempEmail', email);
        sessionStorage.setItem('tempPassword', password);
        showOTPModal(email);
        
      } catch (error) {
        console.error('❌ Error en el proceso:', error);
        alert('❌ ' + (error.message || 'Error desconocido'));
      }
    });
    
    function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider)
        .then(async (result) => {
          const user = result.user;
          const userId = user.uid;
          const userDoc = await db.collection('users').doc(userId).get();
          
          if (!userDoc.exists) {
            const username = user.displayName.toLowerCase().replace(/\s+/g, '_');
            await db.collection('users').doc(userId).set({
              username,
              name: user.displayName,
              email: user.email,
              userType: 'client',
              isPremium: false,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('usernames').doc(username).set({
              email: user.email,
              userType: 'client',
              uid: userId,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
          window.location.href = 'index.html';
        })
        .catch((error) => alert('❌ Error con Google: ' + error.message));
    }
    
    async function sendOTPEmail(email, otp) {
      const userName = email.split('@')[0];
      
      console.log('📦 Enviando a EmailJS...');
      
      const templateParams = {
        to_email: email,
        user_name: userName,
        otp_code: otp
      };
      
      try {
        // TU ID DE SERVICIO
        const serviceID = 'service_822cqyn';
        
        // TU NUEVO ID DE PLANTILLA
        const templateID = 'template_2ue0da9';
        
        await emailjs.send(serviceID, templateID, templateParams);
        
        console.log('✅ Email enviado exitosamente');
        return true;
      } catch (error) {
        console.error('❌ Error al enviar email:', error);
        throw new Error('No se pudo enviar el código. Verificá la consola.');
      }
    }
    
    async function verifyOTP() {
      const email = sessionStorage.getItem('tempEmail');
      const password = sessionStorage.getItem('tempPassword');
      
      if (!email || !password) {
        alert('❌ Sesión expirada.');
        sessionStorage.clear();
        document.getElementById('otpModal').style.display = 'none';
        return;
      }
      
      const otpInputs = document.querySelectorAll('.otp-input');
      let otp = '';
      otpInputs.forEach(input => otp += input.value);
      
      if (otp.length !== 6) {
        document.getElementById('otpError').textContent = 'Ingresá los 6 dígitos';
        return;
      }
      
      try {
        const otpDoc = await db.collection('otp_codes').doc(email).get();
        if (!otpDoc.exists) throw new Error('Código inválido');
        
        const data = otpDoc.data();
        if (data.expiresAt.toDate() < new Date()) throw new Error('Código expirado');
        
        if (data.code !== otp) {
          const newAttempts = (data.attempts || 0) + 1;
          await db.collection('otp_codes').doc(email).update({ attempts: newAttempts });
          document.getElementById('otpError').textContent = `Incorrecto. Intentos: ${newAttempts}/3`;
          return;
        }
        
        // Login exitoso
        await firebase.auth().signInWithEmailAndPassword(email, password);
        await db.collection('otp_codes').doc(email).delete();
        sessionStorage.clear();
        
        // Redirección según tipo
        const userId = email.split('@')[0];
        const techDoc = await db.collection('technicians').doc(userId).get();
        window.location.href = techDoc.exists ? 'technician-zone.html' : 'index.html';
        
      } catch (error) {
        document.getElementById('otpError').textContent = error.message;
      }
    }
    
    async function resendOTP() {
      const email = sessionStorage.getItem('tempEmail');
      if (!email) return;
      
      try {
        const otp = generateOTP();
        await db.collection('otp_codes').doc(email).set({
          code: otp,
          expiresAt: new Date(Date.now() + 10 * 60 * 1000),
          attempts: 0
        });
        await sendOTPEmail(email, otp);
        alert('✅ Código reenviado');
        document.querySelectorAll('.otp-input').forEach(i => i.value = '');
      } catch (e) {
        alert('❌ Error al reenviar');
      }
    }
    
    function generateOTP() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function showOTPModal(email) {
      document.getElementById('otpEmail').textContent = email;
      document.getElementById('otpModal').style.display = 'flex';
      document.querySelector('.otp-input').focus();
    }
    function setupOTPInputs() {
      const inputs = document.querySelectorAll('.otp-input');
      inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          e.target.value = e.target.value.replace(/[^0-9]/g, '');
          if (e.target.value && index < 5) inputs[index + 1].focus();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && index > 0) inputs[index - 1].focus();
        });
        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const data = e.clipboardData.getData('text').slice(0, 6);
          data.split('').forEach((char, i) => {
            if (inputs[i] && /[0-9]/.test(char)) inputs[i].value = char;
          });
          inputs[Math.min(data.length, 5)].focus();
        });
      });
    }
    function checkAuthState() {
      firebase.auth().onAuthStateChanged((user) => { if (user) window.location.href = 'index.html'; });
    }
  </script>
</body>
</html>
