<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Cliente - Cell Space</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <img src="assets/logo.png" class="login-logo" onerror="this.style.display='none'">
          <h1>Registro <span style="color:var(--orange)">Cliente</span></h1>
        </div>
        
        <form id="registerClientForm">
          <div class="form-group">
            <label>Nombre de Usuario</label>
            <input type="text" id="clientUsername" placeholder="Ej: nahuel_encinas" required minlength="3">
            <small style="color:var(--muted);font-size:12px;">Mínimo 3 caracteres, sin espacios</small>
          </div>
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" id="clientName" placeholder="Tu nombre completo" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="clientEmail" placeholder="tu@email.com" required>
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="clientPhone" placeholder="3782-XXXXXX" required>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="clientPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Crear Cuenta</button>
        </form>
        
        <div class="login-footer">
          <p>¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a></p>
          <p style="margin-top:10px;">¿Sos técnico? <a href="register-technician.html">Registrate como técnico</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    document.getElementById('registerClientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('clientUsername').value.trim().toLowerCase().replace(/\s+/g, '_');
      const name = document.getElementById('clientName').value;
      const email = document.getElementById('clientEmail').value;
      const phone = document.getElementById('clientPhone').value;
      const password = document.getElementById('clientPassword').value;
      
      // Validar username
      if (username.length < 3) {
        alert('⚠️ El nombre de usuario debe tener al menos 3 caracteres');
        return;
      }
      
      // Verificar que el username no exista
      try {
        const usernameDoc = await db.collection('usernames').doc(username).get();
        if (usernameDoc.exists) {
          alert('⚠️ Ese nombre de usuario ya está en uso. Probá con otro.');
          return;
        }
      } catch (error) {
        console.error('Error verificando username:', error);
      }
      
      try {
        await firebase.auth().createUserWithEmailAndPassword(email, password);
        
        // Guardar datos del cliente
        await db.collection('clients').doc(email.split('@')[0]).set({
          username,
          name,
          email,
          phone,
          userType: 'client',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        // Reservar el username
        await db.collection('usernames').doc(username).set({
          email,
          userType: 'client',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        alert('✅ Cuenta creada exitosamente. Ahora podés iniciar sesión.');
        window.location.href = 'login.html';
        
      } catch (error) {
        alert('❌ Error: ' + error.message);
      }
    });
  </script>
</body>
</html>
