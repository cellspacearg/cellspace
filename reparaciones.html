<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastrear Reparación - Cell Space</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css?v=15">
  <link rel="stylesheet" href="css/reparaciones.css">
  
  <!-- Supabase SDK (Reemplaza a Firebase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="particles" id="particles"></div>

  <!-- HEADER LIMPIO PARA RASTREO -->
  <header class="tech-header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Volver al inicio
    </a>
    <div class="header-content">
      <h1>Sistema <span>Técnico</span></h1>
      <p>Seguimiento de reparaciones en tiempo real</p>
    </div>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="tech-content">
    <div class="card">
      <h2><i class="fas fa-search" style="color: var(--orange);"></i> Rastrear mi equipo</h2>
      <p class="subtitle">Ingresá el número de orden para ver el estado de tu reparación.</p>
      
      <div class="search-box">
        <input type="text" id="orderInput" placeholder="Ej: TS-2024-0001" maxlength="15">
        <button onclick="trackOrder()" class="btn-track">
          <i class="fas fa-search"></i> Buscar
        </button>
      </div>
      <p class="hint">💡 ¿No tenés tu número de orden? Consultalo en tu comprobante o <a href="https://wa.me/5493782437674" target="_blank">escribinos por WhatsApp</a></p>
      
      <div id="trackResult" class="result-container"></div>
    </div>
  </main>

  <!-- SCRIPTS (LIMPIOS Y SIN DUPLICADOS) -->
  <script src="js/config.js"></script>
  <script src="js/auth-middleware.js"></script>
  <script src="js/reparaciones.js"></script>
</body>
</html>
