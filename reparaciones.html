<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastrear Reparación - Cell Space</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/reparaciones.css">
  
  <!-- Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <!-- HEADER -->
  <header class="tech-header">
    <a href="index.html" class="back-btn">← Volver al inicio</a>
    <div class="header-content">
      <h1>Sistema <span>Técnico</span></h1>
      <p>Seguimiento de reparaciones en tiempo real</p>
    </div>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="tech-content">
    <div class="card">
      <h2>🔍 Rastrear mi equipo</h2>
      <p class="subtitle">Ingresá el número de orden para ver el estado de tu reparación.</p>
      
      <div class="search-box">
        <input type="text" id="orderInput" placeholder="Ej: TS-2024-0001" maxlength="15">
        <button onclick="trackOrder()">🔍 Buscar</button>
      </div>
      <p class="hint">💡 ¿No tenés tu número de orden? Consultalo en tu comprobante o escribinos por WhatsApp</p>
      
      <div id="trackResult" class="result-container"></div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/reparaciones.js"></script>
  <!-- Scripts de autenticación -->
<script src="js/config.js"></script>
<script src="js/auth-middleware.js"></script>
<script src="js/header-auth.js"></script>

<script>
  // Inicializar header según estado de login
  document.addEventListener('DOMContentLoaded', async () => {
    await updateHeaderAuth();
  });
</script>
</body>
</html>
